{% extends "base.html" %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="glass-panel rounded-4 p-4 p-md-5">
            <h2 class="brand-title h4 mb-3">Select Your Role</h2>
            <p class="text-secondary mb-4">Choose how you want to use Legal Portal.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button type="submit" name="role" value="client" class="btn btn-lg btn-outline-primary">Find an Advocate</button>
                    <button type="submit" name="role" value="advocate" class="btn btn-lg btn-warning">Register as Advocate</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
