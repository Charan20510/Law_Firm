{% extends "base.html" %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-8">
        <div class="glass-panel rounded-4 p-4 p-md-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h2 class="brand-title h4 mb-0">{{ title }}</h2>
                <span class="badge text-bg-light border">Secure Form</span>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="error-box">{{ form.non_field_errors }}</div>
                {% endif %}
                {{ form.as_p }}

                <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                    <button type="submit" class="btn btn-warning px-4 fw-semibold">Save Record</button>
                    <a href="/dashboard/" class="btn btn-outline-secondary px-4">Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
