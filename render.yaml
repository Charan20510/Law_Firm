services:
  - type: web
    name: law-firm
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn legal_portal.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: law-firm.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://law-firm.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: law-firm-db
          property: connectionString

databases:
  - name: law-firm-db
    plan: free
